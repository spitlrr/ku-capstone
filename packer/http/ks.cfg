# Kickstart file for Rocky Linux 9 minimal installation
# network installation
url --url=http://dl.rockylinux.org/pub/rocky/9/BaseOS/x86_64/os/
repo --name="AppStream" --baseurl=http://dl.rockylinux.org/pub/rocky/9/AppStream/x86_64/os/

# use text mode install
text
# keyboard and language
keyboard us
lang en_US.UTF-8

# network information
network --bootproto=dhcp --device=link --onboot=true --activate --hostname=rocky-base

# disable root account
rootpw --lock

# add user and groups
user --name=capstone --password=capstone --plaintext --groups=wheel
user --name=vagrant  --password=vagrant  --plaintext --groups=wheel

# system services
selinux --enforcing
firewall --enabled --service=ssh
services --enabled="NetworkManager,sshd"

# timezone
timezone America/Chicago --utc

# bootloader and partitioning
bootloader --location=mbr --boot-drive=sda
ignoredisk --only-use=sda
zerombr
clearpart --all --initlabel --disklabel=msdos
part swap --size=1024
part /boot --fstype="xfs" --size=512
part pv.01 --grow --size=1
volgroup vg_root pv.01
logvol / --fstype="xfs" --name=lv_root --vgname=vg_root --size=1 --grow

# packages
%packages --ignoremissing
@^minimal-environment
-iwl*firmware
openssh-server
openssh-clients
NetworkManager
xfsprogs
%end

reboot

%post
# Update the system and enable necessary services
sudo dnf update -y
sudo dnf upgrade -y
systemctl enable NetworkManager

# create .ssh directory
mkdir -p /home/capstone/.ssh
chown capstone:capstone /home/capstone/.ssh
chmod 700 /home/capstone/.ssh

# add vagrant's standard insecure public key to the authorized_keys file
cat > /home/capstone/.ssh/authorized_keys <<'EOF'
ssh-rsa  vagrant insecure public key
EOF

# enable password authentication for Packer to connect (disabled later in cleanup.sh)
sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
sed -i 's/^#PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
echo "PasswordAuthentication yes" >> /etc/ssh/sshd_config

# set permissions for the authorized_keys file
chown capstone:capstone /home/capstone/.ssh/authorized_keys
chmod 600 /home/capstone/.ssh/authorized_keys
chmod 600 /home/capstone/.ssh/authorized_keys
chmod 600 /home/vagrant/.ssh/authorized_keys
chown -R vagrant:vagrant /home/vagrant/.ssh

# allow passwordless sudo for user
echo "vagrant ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/vagrant
chmod 0440 /etc/sudoers.d/vagrant

echo "capstone ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers.d/capstone
chmod 0440 /etc/sudoers.d/capstone

systemctl restart sshd

%end